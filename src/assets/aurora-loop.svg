<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e6c274" stop-opacity="0.55" />
      <stop offset="70%" stop-color="#e6c274" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="g-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8912a" stop-opacity="0.45" />
      <stop offset="70%" stop-color="#c8912a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="g-violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#7c5cff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="g-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.36" />
      <stop offset="70%" stop-color="#2563eb" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="72" />
    </filter>
  </defs>

  <g filter="url(#soft)">
    <circle cx="620" cy="150" r="320" fill="url(#g-gold)">
      <animateTransform attributeName="transform" type="translate" dur="19s"
        repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.33;0.66;1"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        values="0 0; 60 40; -40 30; 0 0" />
    </circle>
    <circle cx="1040" cy="120" r="260" fill="url(#g-amber)">
      <animateTransform attributeName="transform" type="translate" dur="23s"
        repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.33;0.66;1"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        values="0 0; -70 30; 40 -30; 0 0" />
    </circle>
    <circle cx="150" cy="240" r="280" fill="url(#g-violet)">
      <animateTransform attributeName="transform" type="translate" dur="27s"
        repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.5;1"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="0 0; 50 -40; 0 0" />
    </circle>
    <circle cx="520" cy="720" r="300" fill="url(#g-blue)">
      <animateTransform attributeName="transform" type="translate" dur="31s"
        repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.5;1"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="0 0; -50 -30; 0 0" />
    </circle>
    <circle cx="1080" cy="700" r="280" fill="url(#g-gold)">
      <animateTransform attributeName="transform" type="translate" dur="35s"
        repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.5;1"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
        values="0 0; 40 40; 0 0" />
    </circle>
  </g>
</svg>
